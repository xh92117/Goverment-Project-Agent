[project]
name = "deerflow-harness"
version = "0.1.0"
description = "Agent Base harness framework"
requires-python = ">=3.12"
dependencies = [
    "agent-sandbox>=0.0.19",
    "dotenv>=0.9.9",
    "httpx>=0.28.0",
    "langchain>=1.2.15",
    "langchain-anthropic>=1.4.1",
    "langchain-deepseek>=1.0.1",
    "langchain-openai>=1.2.1",
    "langgraph>=1.1.9",
    "langgraph-api>=0.8.1",
    "langgraph-cli>=0.4.24",
    "langgraph-runtime-inmem>=0.28.0",
    "pydantic>=2.12.5",
    "pyyaml>=6.0.3",
    "tiktoken>=0.8.0",
    "langgraph-checkpoint-sqlite>=3.0.3",
    "langgraph-sdk>=0.1.51",
    "openpyxl>=3.1.5",
    "pillow>=12.2.0",
    "sqlalchemy[asyncio]>=2.0,<3.0",
    "aiosqlite>=0.19",
    "alembic>=1.13",
    "xlrd>=2.0.2",
]

[project.optional-dependencies]
acp = ["agent-client-protocol>=0.4.0"]
anthropic = ["langchain-anthropic>=1.4.1"]
deepseek = ["langchain-deepseek>=1.0.1"]
documents = [
    "duckdb>=1.4.4",
    "markdownify>=1.2.2",
    "markitdown[all,xlsx]>=0.0.1a2",
]
google = ["langchain-google-genai>=4.2.1"]
mcp = ["langchain-mcp-adapters>=0.2.2"]
openai = ["langchain-openai>=1.2.1"]
ollama = ["langchain-ollama>=0.3.0"]
postgres = [
    "asyncpg>=0.29",
    "langgraph-checkpoint-postgres>=3.0.5",
    "psycopg[binary]>=3.3.3",
    "psycopg-pool>=3.3.0",
]
pymupdf = ["pymupdf4llm>=0.0.17"]
search = [
    "ddgs>=9.10.0",
    "exa-py>=1.0.0",
    "firecrawl-py>=1.15.0",
    "readabilipy>=0.3.0",
    "tavily-python>=0.7.17",
]
sandbox-kubernetes = ["kubernetes>=30.0.0"]
tracing = ["langfuse>=3.4.1"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["deerflow", "agent_base"]
