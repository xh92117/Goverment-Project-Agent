# Full Agent Base configuration sketch.
#
# This file shows how the split examples compose. Keep production config small:
# start from configs/base.example.yaml and copy only the sections you need.

config_version: 11
log_level: info

models:
  - name: default
    display_name: Default Model
    use: langchain_openai:ChatOpenAI
    model: gpt-4.1
    api_key: $OPENAI_API_KEY
    supports_vision: true
    supports_thinking: false

sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider
  allow_host_bash: false

subagents:
  enabled: true
  max_concurrent_subagents: 3
  max_turns: 8
  timeout_seconds: 300

memory:
  enabled: false

skills:
  enabled: true

tool_search:
  enabled: true

token_usage:
  enabled: true

title:
  enabled: true

summarization:
  enabled: false
