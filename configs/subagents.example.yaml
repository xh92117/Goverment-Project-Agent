# Agent Base subagent configuration examples.
#
# The default orchestrator keeps the upstream strategy:
# decompose complex work, delegate independent subtasks, then synthesize.

subagents:
  enabled: true
  max_concurrent_subagents: 3
  max_process_concurrent_subagents: 4
  tool_call_limits:
    web_search: 2
    web_fetch: 3
    web_extract: 1
  max_turns: 8
  timeout_seconds: 300

  agents:
    general-purpose:
      max_turns: 8
      timeout_seconds: 300

    bash:
      max_turns: 6
      timeout_seconds: 180

  custom_agents:
    domain-researcher:
      description: "Research a focused domain question and return sourced findings."
      system_prompt: |
        You are a focused research subagent. Investigate the assigned question,
        use only the tools available to you, and return concise findings with
        evidence and uncertainties.
      tools:
        - read_file
        - web_search
      max_turns: 6
      timeout_seconds: 240
